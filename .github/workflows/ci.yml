name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
    