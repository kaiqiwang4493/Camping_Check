name: Monitor Yosemite Camping

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: yosemite-camping-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e .

      - name: Run monitor
        env:
          CLICKSEND_USERNAME: ${{ secrets.CLICKSEND_USERNAME }}
          CLICKSEND_API_KEY: ${{ secrets.CLICKSEND_API_KEY }}
          PHONE_TO: ${{ secrets.PHONE_TO }}
          PHONE_FROM: ${{ secrets.PHONE_FROM }}
          SCAN_MONTHS: ${{ vars.SCAN_MONTHS }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          REPORT_PATH: state/run-report.json
          SUMMARY_PATH: state/run-summary.md
        run: python -m yosemite_monitor

      - name: Publish run summary
        if: always()
        run: |
          if [ -f state/run-summary.md ]; then
            cat state/run-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Yosemite Camping Monitor" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run did not produce a summary file." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on log issue
        if: ${{ success() && vars.LOG_ISSUE_NUMBER != '' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const issueNumber = Number(process.env.LOG_ISSUE_NUMBER);
            const body = fs.readFileSync('state/run-summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });
        env:
          LOG_ISSUE_NUMBER: ${{ vars.LOG_ISSUE_NUMBER }}

      - name: Commit updated state
        run: |
          if git diff --quiet -- state/notified-openings.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/notified-openings.json
          git commit -m "Update camping monitor state [skip ci]"
          git push
