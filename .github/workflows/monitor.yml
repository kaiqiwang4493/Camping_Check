name: Monitor Yosemite Camping

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yosemite-camping-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e .

      - name: Run monitor
        env:
          CLICKSEND_USERNAME: ${{ secrets.CLICKSEND_USERNAME }}
          CLICKSEND_API_KEY: ${{ secrets.CLICKSEND_API_KEY }}
          PHONE_TO: ${{ secrets.PHONE_TO }}
          PHONE_FROM: ${{ secrets.PHONE_FROM }}
          SCAN_MONTHS: ${{ vars.SCAN_MONTHS }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: python -m yosemite_monitor

      - name: Commit updated state
        run: |
          if git diff --quiet -- state/notified-openings.json; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/notified-openings.json
          git commit -m "Update camping monitor state [skip ci]"
          git push

